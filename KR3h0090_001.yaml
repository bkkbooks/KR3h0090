body:
  text: 園冶園冶明計成自序不佞少以繪名性好搜奇最喜關仝荊浩筆意每宗之游燕及楚中歲歸吳江蘇擇居潤州環潤皆佳山水潤之好事者取石巧者置竹木間為假山予偶觀之為發一笑或問日何笑予曰世所聞有真斯有假胡不假真山形而假迎勾芒者之拳磊乎或曰君能之乎遂偶為成壁靚觀者俱稱儼然佳山也遂播聞於遠近適晉陵方伯吳又予公開而招之公得基於城東乃蒙元溫相故園僅十五畝公示予曰斯十畝為宅餘五畝可效司馬溫公獨樂制予觀其基形最高而窮其源最深喬木參天虯枝拂地予曰此制不第宜掇石而高且宜搜土而下合喬木參差山腰蟠根嵌石宛若畫意依水而上構亭台錯落池面篆壑飛廊想出意外落成公喜曰從進而出計步僅四里自得謂江南之勝惟吾獨收矣別有小築片山斗室予胸中所蘊奇亦覺發抒略盡益複自喜時汪士衡中翰言於鑾江西築似為合志興又予公所構並騁南北江焉暇草式所制名園牧爾姑孰曹元甫先生游於茲主人皆予盤桓信宿先生稱贊不已以為荊關之繪也何能成於筆底予遂出其式視先生先生曰斯千古為文件者何以雲牧斯乃君之開關改之曰冶可矣崇禎辛未知秋杪否道人暇於扈冶堂中題卷一興造論世之興造專主鳩匠獨不聞三分匠七分主人之諺乎非主人也能主之人也古公輸巧陸雲精藝其人豈執斧斤者哉若匠惟雕鏤是巧排架是精一架一柱定不可移俗以無竅之人呼之其確也故凡造作必先想地立基然後定期間進量其廣狹隨曲合方是在主者能妙於得體合宜未可拘牽假如基地偏缺鄰嵌何必欲求其齊其屋架何必拘三五間為進多少半間一廠自然雅稱斯所謂主人之七分也第園築之主猶須什九而用匠什一何也園林巧於因界精在體宜愈非匠作可為亦非主人所能自主義需求得人當要節用因者隨基勢高下體形之端正礙木刪椏泉流石注互相借資宜亭斯亭宜榭斯樹不妨偏徑頓置婉轉斯謂精而合宜者也借者園雖別內外得景則無拘遠近晴巒聳秀紺宇凌空極目所至俗則屏之嘉則收之不分町畽盡為煙景斯所謂巧而得體者也體宜因借匪得其人兼之惜費則前工並棄既有後起之輸雲何傳於世予亦恐浸失其源聊繪式於後為好事者公焉一相地園基不拘方向地勢自有高低涉門成趣得景隨形或傍山林欲通河沼探奇近郭遠來往之通衢選勝落村藉參差之深樹村莊眺野城市便家新築易乎開基祇可栽楊移竹舊園妙於翻造自然古木繁花如方如圓似偏似曲如長彎而環璧似偏闊以鋪雲高方欲就亭台低凹可開池沼卜築貴從水面立基先究源頭疏源之去由察水之來歷臨溪越地虛閣堪支來巷借天浮廊可度倘嵌他人之勝有一線相通非為間絕借景偏宜若對鄰氏之花饞幾分消息可以招呼收春無盡架橋通隔水別館堪圖聚石迭圍牆居山可擬多年樹木礙築簷垣讓一步可以立根斫數椏不妨封頂斯謂雕棟飛楹構易蔭槐挺玉成難相地合宜構園得體園地為山林勝有高有凹有曲有深有峻而懸有平而坦自成天然之趣不煩人事之工入奧疏源就低鑿水搜土開其穴麓培山接以房廊雜樹參天樓閣礙雲霞而出沒繁花覆地亭台突池沼而參差絕澗安其梁飛岩假其棧閒閒即景寂寂探春好鳥要明群麋偕侶檻逗幾番花信門灣一帶溪流竹裏通幽松寮隱僻送濤聲而鬱鬱起鶴舞而翩翩階前自掃雪嶺上誰鋤月千巒環翠萬壑流青欲藉陶輿何緣謝屐市井不可園也如園之必向幽偏可築鄰雖近俗門掩無嘩開徑逶迤竹木遙飛迭雉臨濠蜒蜿蜒柴荊橫引長紅院廣堪梧提灣宜柳別難成野茲易為林架屋隨基浚水堅之石麓安亭得景蒔花以春風虛閣蔭桐清池涵月洗出千家煙雨移將四壁圖書素人鏡中飛練青來郭外環屏芍藥宜欄薔薇未架不妨憑石最厭編屏束久重修安垂不朽片山多致寸石生情窗虛蕉影玲瓏岩曲松根盤礡足微市隱猶勝巢居能為鬧處尋幽胡舍近方圖遠得閒即詣隨興攜游古之樂田園者居畝畝之中今耽丘壑者選村莊之勝團團籬落處處桑麻鑿水為濠挑堤種柳門樓知稼廊廡連雲連蕓約十畝之基須開池者三曲折有情疏源正可餘七分之地為迭土者四高卑無論栽竹相宜堂需綠野猶開花隱重門若掩掇石磨知山假到橋若謂津通桃李成蹊樓薹入畫圍牆編棘竇留山犬迎人曲徑繞籬苔破家童掃葉秋老蜂房未割西成鶴凜先支安閒莫管稻梁謀酤酒不辭風雪陸歸林得志老囿有餘郊野擇地依乎平岡曲塢迭隴喬林水浚通源橋橫跨水去城不數里而往來可以任意若為快也諒地勢之崎嶇得基局之大小圍知版築構擬習池開荒欲引長流摘景全留雜樹搜根懼水理頑石而堪支引蔓通津緣飛而可度風生寒峭溪灣柳間栽桃月隱清微屋繞梅餘種竹似多幽趣更入深情兩三間曲盡春藏一二處堪為暑避隔林鳩喚雨斷岸馬嘶風花落呼童竹深留客任看主人何必問還要姓氏不須題需陳風月清音休犯山林罪過韻人安褻俗筆偏塗宅傍與後有隙地可葺園不第便於樂閒斯謂護宅之佳境也開池浚壑理石挑山設門有待來賓留徑可通爾邇室竹修林茂柳暗花明五畝何拘且效溫公之獨樂四時不謝宜偕小玉以同游日竟花朝宵分月夕家庭侍酒須開錦幛之藏客集征詩量罰金穀之數多方題詠薄有洞天常餘半榻琴書不盡數竿煙雨澗戶若為止靜家山何必求深宅遺謝眺之高風嶺劃孫登之長嘯探梅虛蹇煮雪當姬輕身尚寄玄黃具眼胡分青白固作千年事寧知百歲人足矣樂閒悠然護宅江幹湖畔深柳疏蘆之際略成小築足微大觀也悠悠煙水澹澹雲山泛泛魚舟閒閒鷗鳥漏層陰而藏閣迎先月以登台拍起雲流觴飛霞佇何如嶺堪偕子晉吹簫欲擬瑤池若待穆王待宴尋閒是福知享既仙二立基凡園圃立基定廳堂為主先乎取景妙在朝南倘有喬木數株僅就中庭一二築垣須廣空地多存任意為持聽從排布擇成館舍餘構亭台格式隨宜栽培得致選向非拘宅相安門須合廳方開土堆山沿池駁岸曲曲一灣柳月濯魄清波遙遙十里荷風遞香幽室編籬種菊因之陶令當年鋤嶺栽梅可並庾公故跡尋幽移竹對景蒔花桃李不言似通津信池塘倒影擬人鮫宮一派涵秋重陰結夏疏水若為無盡斷處通橋開林須酌有因按時架屋房廊蜒蜿樓閣崔巍動江流天地外之情合山色有無中之句適興平蕪眺遠壯觀喬嶽瞻遙高阜可培低方宜挖廳堂立基古以五間三間為率須量地廣窄四間亦可四間半亦可再不能展舒三間半亦可深奧曲折通前達後全在斯半間中生出幻境也凡立園林必當如式樓閣之基依次序定在廳堂之後何不立半山半水之間有二層三層之說下望上是樓山半擬為平屋更上一層可窮千里目也園林屋宇雖無方向惟門樓基要依廳堂方向合宜則立書房之基立於園林者無拘內外擇偏僻處隨便通園令游人莫知有此內構齋館房室借外景自然幽雅深得山林之趣如另築先相基形方圓長扁廣闊曲狹勢如前廳堂基餘半間中自然深奧或樓或屋或廊或榭按基形式臨機應變而立花間隱榭水際安亭斯園林而得致者惟榭祇隱花間亭胡拘水際通泉竹裏按景山顛或翠筠茂密之阿蒼松蟠鬱之麓或借濠濮之上入想觀魚倘支滄浪之中非歌濯足亭安有式基立無憑廊基未立地局先留或餘屋之前後漸通林許躡山腰落水面任高低曲折自然斷續蜿蜒員林中不可少斯一斷境界假山之基約大半在水中立起先量頂之高大纏定基之淺深綴石須知占天圍土然占地最忌居中更宜散漫三屋宇凡家宅住房五間三間循次第而造惟園林書屋一室半室按時景為情方向隨宜鳩工合見家居必論野築惟因隨廳堂俱一般近台榭有別致前添敞卷後進餘軒必有重椽須支草架高低依制左右分為當簷最礙兩廂庭除恐窄落步但加重廡階砌猶深升栱不讓雕鸞門枕胡為鏤鼓時遵雅樸古摘端方畫彩雖佳木色加之青綠雕鏤易俗花空嵌以仙禽長廊一帶回旋在豎柱之初妙於變幻小屋數椽委曲究安門之當理及精微奇亭巧榭構分紅紫之叢層閣重樓出雲霄之上隱現無窮之態招搖不盡之春檻外行雲鏡中流水洗山色之不去送鶴聲之自來境仿瀛壺天然圖畫意盡林泉之癖樂餘園圃之間一鑒能為千秋不朽堂占太史亭問草玄非及雲藝之台樓且操般門之斤斧探其合志智常套俱柴門上起樓象城堞有樓以壯觀也無樓亦呼之古者之堂自半已前虛之為堂堂者當也謂當正向陽之屋以取堂堂高顯之義齋較堂惟氣藏而致斂蓋藏修密處之地故式不宜敞顯古云自半已前后實為室尚書有壤室左傳有窟室文選載旋室娟以窈窕指曲室也釋名云房者防也防密內外以寢闥也散寄之居曰館可以通別居者今書房亦稱館客舍為假館說文云重屋曰樓爾雅云陝而修曲為樓言窗牖虛開諸孔慺慺然也造式如堂高一層者是也釋名云台者持也言築土堅高能自勝持也園林之台或掇石而高上平者或木架高而版平無屋者或樓閣前出一步而敞者俱為台閣者四阿開四牖漢有麒麟閣唐有凌煙閣等皆是式釋名云亭者停也所以亭憩游行也司空圖有休休亭本此義造式無定自三角四角五角梅花六角橫圭八角至十字隨意合宜則制惟地圖可略式也釋名云榭者藉也藉景而成者也或水邊或花畔制亦隨態軒式纇車取軒軒欲舉之意宜置高敞以助勝則稱卷者廳堂前欲寬展所以添設也或小室欲異人宇亦為斯式惟四角亭及軒可並之古云因岩為屋曰广蓋借岩成勢不成完屋者為广廊者廡出一步也宜曲宜長則勝古之曲廊俱曲尺曲今於所構曲廊之宇曲者隨形而彎依勢而曲或蟠山腰或窮水際通花渡壑蜿蜒無盡斯寢園之篆云也予見潤之甘露寺數間高下廊傳說魯班所造五架梁乃廳堂有過梁也如前後各添一架合七架梁列架式如前添卷必須草架而軒敞不然前簷深下內黑暗者斯故也如欲寬展前再添一廊又小五架梁亭榭書樓可構將後童柱換長柱可裝屏門有別前後或添廊亦可七架梁凡屋之列架也如廳堂列添卷亦用草架前後再一添架斯九架列之活法如造樓閣先算上下簷數然後取柱料長許中加替木九架梁屋巧於裝折連四五六間可以面東西南北或隔三間兩間一間半間前後分為須用複水重椽觀之不知其所或嵌樓於上斯巧妙處不能盡式祇可相機而用非拘一者草架乃廳堂之必用者凡屋添卷用天溝且費事不耐久故以草架表裏整齊向前為廳向後為樓斯草架之妙用也不可不知重椽草架上椽也乃屋中假屋也凡屋隔分不仰頂用重椽複水可觀惟廊構連屋或構倚牆一披而下斷不可少斯磨角如殿閣擸角也閣四敞及諸亭決用如亭之三角至八角各有磨法盡不能式是自得依番機構如廳堂前添廊亦可磨角當量宜凡瓦作止能式屋列圖式地圖者鮮矣夫地圖者主匠之合見也假如一宅基欲造幾進先以地圖式之其進幾間用幾柱著地然後式之列圖如屋欲造巧妙先以斯法以便為也屋宇圖式五架過梁式前或添卷後添架合成七架列草架式為廳堂前添卷須用草架前再加之步廊可以磨角七架列式凡屋以七架為率七架醬架式不用脊柱便於挂畫或朝南北屋傍可朝東西之法九架梁六柱式前後卷式此屋宜多間隨便隔間複水或向東西南北之活法小五架梁式凡造書房小齋或亭此式可分前後地圖式凡興造必先式新偷柱定磉量基廣狹次是列圖凡廳堂中一間宜大傍間宜小不可勻造梅花亭地圖式先以石砌成梅花基立柱於瓣結頂合簷亦如梅花也十字地圖式十二柱四分而立頂結方尖周簷亦成十字諸亭不式為梅花十字自古偽造者故式之地圖聊識其意可也斯二亭祇可蓋草四裝折凡造作難於裝修惟園屋異乎家宅曲折有條端方非額如端方中須尋曲折到曲折處環定端方相間得宜錯宗為妙裝壁應為排比安門分出來由假如全房數間內中隔開可矣定存後步一架餘外添設何哉便徑他居複成別館磚牆留夾可通不斷之房廊板壁常空隱出別壺之天地亭台影罅樓閣虛鄰絕處猶開低方忽上樓梯僅乎室側台級藉矣山阿門扇豈異尋常窗欞遵時各式掩宜何線嵌不窺絲落步欄桿長廊猶勝半牆窗隔是室皆然古以委花為巧今之柳葉生奇加之明瓦斯堅外護風窗覺密半樓半屋依替木不妨一色天花藏房藏閣靠虛簷無礙半彎月牖借架高簷須知下卷出幕若分別院連牆儗越深齋構合時宜式微清賞卷二欄桿欄桿信畫化而成減便為雅古之回文萬字一概屏去少留涼床佛座之用園屋間一不可制也予歷數年存式百狀有工而精有減而文依次序變幻式之於左便為摘用以筆管式為始近有將篆字制欄桿者況理畫不勻意不聯絡予斯式中尚覺未盡盡可粉飾欄桿圖式筆管式欄桿以筆管式為始以單變雙雙則如意變畫以勻而成故有名無名者恐有遺漏總次序記之內有花紋不易制者亦書做法以便鳩匠錦葵式先以六料攢心然後加瓣如斯做法斯一料攢心斯一料瓣波紋式為斯一料可做梅花式用斯一料瓣料直不攢榫眼聯瓣葵花式為斯一料可做尺欄式此欄置腰牆用或置外短欄式短尺欄式卷三一門窗門窗磨空制式時裁不惟屋宇翻新斯謂林園遵雅工精雖專瓦作調度猶在得人觸景生奇含情多致輕紗環碧弱柳窺青偉石迎人別有一壺天地修篁弄影疑來隔水笙簧佳境宜收俗塵安到切記雕鏤門空應當磨琢窗垣處處鄰虛方方側景非傳恐失故式存餘門窗圖式方門合角式磨磚方門憑匠俱做券門磚上過門石或過門枋者今之方門將磨磚用木栓栓住合角過門於上在加之過門枋雅致可觀圈門式凡磨磚門窗量牆之厚薄校磚之大小內空須用滿磨外邊祇可寸許不可就磚邊外或石粉或滿磨可也上下圈式蓮花式如意式貝葉式蓮瓣如意貝葉斯三式宜供佛所用二牆垣凡園之圍牆多於版築或於石砌或編籬棘夫編籬斯勝花屏似多野致深得山林趣味如內花端水次夾徑環山之垣或宜石宜磚宜漏宜磨各有所制從雅遵時令人欣賞園林之佳境也歷來牆垣憑匠作雕琢花鳥仙獸以為巧制不第林園之不佳而宅堂前之何可也雀巢可憎積草如蘿祛之不盡扣之則廢無可奈何者市俗村愚之所為也高明而慎之世人興造因基之偏側任而造之何不以牆取頭闊頭狹就屋之端正斯匠主之莫知也歷來粉牆用紙筋石灰有好時取其光膩用白蠟磨打者今用江湖中黃沙並上好石灰少許打底再加少許打底再加少許石灰蓋面以麻帚輕擦自然明亮鑒人倘有污積遂可洗去斯名鏡面牆也如隱門照牆廳堂面牆皆可用磨或方磚吊角或方磚裁成八角嵌小方或小磚一塊間半塊破花砌如錦樣封頂用磨挂方飛簷磚幾層雕鏤花鳥仙獸不可用人畫意者少凡有觀眺處築斯似避外隱內之義古之瓦砌連錢迭錠魚鱗等類一概屏之聊式幾於左是亂石皆可砌惟黃石者佳大小相間宜雜假山之間亂青石版用油灰抿縫斯名冰裂也牆垣圖式漏明牆圖式漏明牆凡計一十六式惟取其堅固如欄桿中亦有可摘砌者意不能盡猶恐重式宜用磨砌者佳三鋪地大凡砌地鋪街小異花園住宅惟廳堂廣廈中鋪一概磨磚如路徑盤蹊長砌多般亂石中庭或一迭勝近砌亦可回文八角嵌方選子鋪成蜀錦層樓出步就花梢琢擬秦台錦線瓦條台全石版吟花席地醉月鋪氈廢瓦片也有行時當湖石削鋪波紋洶湧破方磚可留大用繞梅花磨冰裂紛紜路徑尋常階除脫俗蓮生襪底步出個中來翠拾林深春從何處是花環窄路偏宜石堂回空庭須用磚各式方圓隨宜鋪砌磨歸瓦作雜用鉤兒園林砌路做小亂石砌如榴子者堅固而雅致曲折高卑從山攝壑惟斯如一有用子石間花紋砌路尚且不堅易俗子石宜鋪於不常走處大小間砌者佳恐匠之不能也或磚或瓦嵌成諸錦猶可如嵌鶴鹿獅毯猶類狗者可笑亂青版石冰裂紋宜於山堂水坡台端亭際見前風窗式意隨人活砌法似無拘格破方磚磨鋪猶佳諸磚砌地屋內或磨扁鋪庭下宜砌方勝迭勝步步勝者古之常套也今之人字席紋斗紋量磚長短合宜可也有式四掇山掇山之始椿木為先較其短長察乎虛實隨勢挖其麻柱諒高挂以稱竿繩索堅牢扛抬穩重立根鋪以粗石大塊滿蓋椿頭塹裡掃以查灰著潮盡鑽山骨方堆頑夯而起漸以皴紋而加瘦漏生奇玲瓏安巧峭壁貴於直立懸崖使其後堅岩巒洞穴之莫窮澗壑坡磯只儼是信足疑無別境舉頭自有深情蹊徑盤且長峰巒秀古多方景勝咫尺山林妙在得乎一人雅從兼於半土假如一塊中豎而為主石兩條傍插而乎劈峰獨立端嚴次相輔弼勢如排列狀若趨承主石雖忌於居中宜中者也可劈峰總較於不用豈用乎斷然排如爐燭花瓶列似刀山劍樹峰須五老池鑿四方下洞上台東亭西榭罅堪窺管中之豹路類張孩戲之貓小藉金魚之缸大若酆都之境時宜得致古式何裁深意畫圖於情丘壑未山先麓自然地勢之嶙嶒構土成岡不在石形之巧拙宜台宜榭邀月招雲成徑成蹊尋花問柳臨池駁以石塊粗夯用之有方結嶺挑之以土堆高低觀之多致欲知堆土之奧妙還擬理石之精微山林意味深求花木情緣易逗有真為假做假成真稍動天機全叼人力探奇投好同志須知園中桌掇山非士大夫好事者不為也為者殊有識鑒緣世無合志不盡欣賞而就廳前一壁是以散漫理之可得佳境也人皆廳前掇山環堵中聳起高高三峰排列於前殊為可笑加之以亭及登一無可望置之何益更亦可笑以予見或有嘉樹稍點玲瓏石塊不然牆中嵌理壁岩或頂植卉木垂蘿似有深境也樓面掇山宜最高纏入妙高者恐逼於前不若遠之更有深意閣山似敞也宜於山側坦而可上便以登了何必梯之凡掇小山或依嘉樹卉木聚散而理或懸岩峻壁各有別致書房中最宜者更以山石為池俯於窗下似得濠濮間想池上理山園中第一勝也若大若小更有妙境就水點其步石從巔架以飛梁洞穴潛藏穿岩徑水風巒飄渺漏月招雲莫言世上無仙斯住世之瀛壺也內室中掇山宜堅宜峻壁立岩懸令人不可攀宜堅固者恐孩戲之預防也峭壁山者靠壁理也藉以粉壁為紙以石為繪也理者相石皴紋仿古人筆意植黃山松柏古梅美竹收之圓窗宛然鏡游也山石理池予始創者選版薄山石理之少得竅不能盛水須知等分平衡法可矣凡理塊石俱將四邊或三邊壓掇若壓兩邊恐石平中有損加壓一邊既罅稍有絲縫水不能注雖做灰堅固亦不能止理當斟酌如理山石池法用糙缸一隻或兩隻並排作底或埋半埋將山石周圍理其上仍以油灰抿固缸口如法養魚勝缸中小山峰石一塊者相形何狀選合峰紋石令匠鑿筍為座理宜上大下小立之可觀巒山頭高峻也不可齊亦不可筆架式或高或低隨至亂掇不排比為妙如理懸岩起腳宜小漸理漸大及高使其後堅能懸斯理法古來罕者如懸一石亦懸一石再之不能也予以平衡法將前懸分散後堅仍以長條塹裏石壓之能懸數尺其狀可駭萬無一失理洞法起腳如造屋立幾柱著實掇玲瓏如窗門透亮及理上見前理岩法合湊收頂加條石替之斯千古不朽也洞寬丈餘可設集者自古鮮矣上或堆土植樹或作台或置亭屋合宜可也假山以水為妙倘高阜處不能注水理澗壑無水似有深意曲水古皆鑿石槽上置石龍頭噴水者斯費工類俗何不以理澗法上理石泉口如瀑布亦可流觴似得天然之趣瀑布如峭壁山理也先觀有坑高樓簷水可澗至牆頂作天溝行壁山頂留小坑突出石口泛漫而下纏如瀑布不然隨流散漫不成斯謂作雨觀泉之意夫理假山必欲求好要人說好片山塊石似有野致蘇州虎丘山南京鳳台門販花扎架處處皆然五選石夫識石之來由詢山之遠近石無山價費祇人工跋躡搜巔崎嶇究路便宜出水雖遙千里何妨日計在人就近一肩可矣取巧不但玲瓏求堅還從古拙堪用層堆須先選質無紋俟後依皴合掇多紋恐損垂竅當懸古勝太湖好事祇知花石時遵圖畫原書作盡疑誤匪人焉識黃山小仿雲林大宗子久塊雖頑夯峻更嶙峋是石堪堆便山可採石非草木採後複生人重利名近無圖遠蘇州府所屬洞庭山石產水涯惟消夏灣者為最性堅而潤有嵌空穿眼婉轉嶮怪勢一種色白一種色青而黑一種微黑青其質文理縱橫籠絡起隱於石面遍多坎蓋因風浪中充激而成謂之彈子窩扣之微有聲採人攜錘鑿入深水中度奇巧取鑿貫以巨索浮大舟設木架絞而出之此石以高大為貴惟宜植立軒堂前或點喬松奇卉下裝治假山羅列園林廣榭中頗多偉觀也自古至今採之已久今尚鮮矣昆山縣馬鞍山石產土中為赤土積漬既出土倍費挑剔洗滌其質磊塊巉岩透空無聳拔峰巒勢扣之無聲其色潔白或植小木或種溪蓀於奇巧處或置器中宜點盆景不成大用也宜興縣張公洞善卷寺一帶山產石便於竹林出水有性堅穿眼嶮怪如太湖者有一種色黑質粗而黃者有色白而質嫩者掇山不可懸恐不堅也龍潭金陵下七十餘里地名七星觀至山口倉頭一帶皆產石數種有露土者有半埋者一種色青質堅透漏文理如太湖者一種色微青性堅稍覺頑夯可用起腳壓泛一種色紋古拙無漏宜單點一種色青如核桃紋多皴法者掇能合皴如畫為妙金陵青龍山石大圈大孔者全用匠作鑿取做成峰石只一面勢者自來俗人以此為太湖主峰凡花石反呼為腳石掇如爐瓶式更加以青峰儼如刀山劍樹者斯也或點竹樹下不可高掇宿州靈璧縣地名盤山石產土中採取歲久穴深數丈其質為赤泥漬滿土人多以鐵刃遍刮凡三次既露石色既以鐵絲帚兼磁末刷治清潤扣之鏗然有聲石底多有漬土不能盡者石在土中隨其大小具體而生或成物狀或成峰巒巉岩透空其狀妙有宛轉知勢須藉斧鑿修治磨礱以全其美或一兩面或三面若四面全者即是從土中生起凡數百之中無一二有得四面者擇其奇巧處鐫治取其底平可以頓置幾案亦可以掇小景有一種扁樸或成雲氣者懸之室中為磬書所謂泗濱浮磬是也鎮江府城南大峴山一帶皆產石小者全質人者鐫取連處奇怪萬狀色黃清潤而堅扣之有聲有色灰褐者石多穿眼相通可掇假山宣石產於寧國縣所屬其色潔白多於土積漬須用刷洗讒見其質或梅雨天瓦溝下水客衝盡土色惟斯石應舊逾舊逾白儼如雪山也一種名馬牙宜可置幾案江州湖口石有數種或產水中或產水際一種色青渾然成峰巒岩壑或成類諸物一種扁薄嵌空穿眼通透幾若木版似利刃剜刻之狀石理如刷絲色亦微潤扣之有聲東坡稱賞目之為壺中九華有百金歸買小玲瓏之語英州含光真陽縣之間石產溪水中有數種一微青色間有通白脈籠絡一微灰黑一淺綠各有峰巒嵌空穿眼宛轉相通其質稍潤扣之微有聲可置幾案亦可點盆亦可掇小景有一種色白四面峰巒聳拔多棱角稍瑩徹面面有光可鑒物扣之無聲採人就水中度奇巧處鑿取只可置幾案散兵者漢張子房楚歌散兵處也故名其地在巢湖之南其石若大若小形狀百類浮露於山其色青黑有如太湖者有古拙皴紋者土人採而裝出販賣維揚好事專賣其石有最大巧妙透漏如太湖峰更佳者未嘗採也黃石是處皆產其質堅不入斧鑿其文古挫如常州黃山蘇州堯峰山鎮江圖山沿大江直至採石之上皆產俗人只之頑夯而不知奇妙也世之好事慕聞虛名鑽求舊石某名人題詠某代傳至於今斯真太湖石也今廢欲待價而沽不惜多金售為古玩還可又有惟聞舊石重價買者夫太湖石者自古至今好事採多似鮮矣如別山有未開取者擇其透漏青骨堅質採之未嘗亞太湖也斯古露風何為新耶何為舊耶凡採石惟盤駁人工裝載之費到園殊費幾何予聞一石名百米峰詢之費百米所得故名今欲易百米再盤百米複名二百米峰也凡石露風則舊搜土則新雖有土色未幾雨露亦成舊矣斯石宜舊有五色者有純綠者紋如畫松皮高丈餘闊盈尺者貴丈內者多近宜興有石如錦川其紋眼嵌石子色亦不佳舊者紋眼嵌空色質清潤可以花間樹下插立可觀如理假山如理假山猶類劈峰宋花石綱河南所屬邊近山東隨處便有是運之所遺者其石巧妙者多緣陸路頗艱有好事者少取塊石置園中生色多矣六合縣靈居岩沙士中及水際產瑪瑙石子頗細碎有大如拳純白五色紋者有純五色紋者其溫潤瑩徹擇紋彩斑斕取之鋪地錦如或置澗壑急流水處自然清白夫葺園圃假山處處有石塊但不得其人欲詢出石之所到地有山似當有石雖不得巧妙者隨其頑夯但有紋理可也曾見宋杜綰石譜何處無石予少用過石處聊記於右餘未見者不錄六借景構園無格借景有因切要四時何關八宅林延佇相緣竹樹蕭森城市喧卑必擇居鄰閒逸高原極望遠岫環屏堂開淑氣侵入門引春流到澤嫣紅艷紫欣逢花裏神仙樂聖稱賢足並山中宰相閒居曾賦芳草應憐掃徑護蘭芽分香幽室卷簾邀燕子問剪輕風片片飛花絲絲眠柳寒生料峭高架秋千興適清偏怡情丘壑頓開塵外想擬人畫中行林陰初出鶯歌山曲忽聞樵唱風生林樾境入羲皇幽人即韻於松寮逸士彈琴於篁里紅衣新浴碧玉輕敲看竹溪灣觀魚濠上山容靄靄形雲故落憑欄水面鱗鱗爽氣覺來枕南軒寄傲北牖虛陰半窗碧隱蕉桐環堵翠延蘿薜俯流玩月坐石品泉苧衣不耐涼新池荷香綰梧葉忽驚秋落蟲草鳴幽湖平無際之浮光山媚可餐之秀色寓目一行白鷺醉顏幾陣丹楓了遠高台搔首青天那可問憑虛敞閣舉杯明月自相邀冉冉天香悠悠桂子但覺籬殘菊晚應探嶺暖梅先少系杖頭招攜鄰曲恍來臨月美人卻臥雪廬高士雪冥黯黯木葉蕭蕭風鴉幾樹夕陽寒雁數聲殘月書窗夢醒孤影遙吟錦幛偎紅六花呈瑞棹興若過剡曲掃烹果勝黨家冷韻堪廣清名可並花殊不謝景摘偏新因借無由觸情俱是夫借景林園之最要者也如遠借鄰界仰借俯借應時而借然物情所逗目寄心期似意在筆先庶幾描寫之盡哉卷後崇禎甲戌歲予年五十有三歷盡風塵業游已倦少有林下風趣逃名丘壑中久資林園似興世故覺遠惟聞時事紛紛隱心皆然愧無買山力甘為桃源溪口人也自嘆生人之時也不遇時也武候三國之師梁公女王之相古之賢豪之時也大不遇時也何況草野疏愚涉身丘壑暇著斯冶欲示二兒長生長吉但覓梨慄而巳故梓行合為世便
